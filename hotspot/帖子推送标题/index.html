<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子推送标题生成器</title>
  <style>
    :root { --bg: #f8f9fa; --panel: #fff; --border: #dee2e6; --text: #212529; --muted: #6c757d; --accent: #0d6efd; --green: #198754; --red: #dc3545; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.3rem; margin: 0 0 4px; }
    .subtitle { font-size: 0.8125rem; color: var(--muted); margin-bottom: 16px; }
    label { font-size: 0.875rem; font-weight: 600; display: block; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font: inherit; background: var(--panel); }
    input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,110,253,.15); }
    .btn { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; margin-top: 8px; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-top: 20px; }
    .result-card h2 { font-size: 0.9375rem; color: var(--muted); margin: 0 0 12px; }
    .field { margin-bottom: 12px; }
    .field-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
    .field-value { font-size: 0.9375rem; word-break: break-all; }
    .field-value.title { font-weight: 600; font-size: 1rem; }
    .copy-btn { font-size: 0.6875rem; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 4px; padding: 1px 6px; cursor: pointer; margin-left: 8px; vertical-align: middle; }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .row-line { display: flex; align-items: baseline; gap: 4px; margin-bottom: 2px; }
    .row-line .lang { color: var(--muted); font-size: 0.8125rem; min-width: 2.5em; flex-shrink: 0; }
    .row-line .txt { flex: 1; }
    .err { color: var(--red); font-size: 0.875rem; margin-top: 12px; }
    .loading { color: var(--muted); font-size: 0.875rem; margin-top: 12px; }
    .raw-toggle { font-size: 0.75rem; color: var(--accent); cursor: pointer; border: none; background: none; padding: 0; margin-top: 8px; }
    .raw-box { margin-top: 8px; padding: 10px; background: #f1f3f5; border-radius: 6px; font-size: 0.8125rem; white-space: pre-wrap; word-break: break-all; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>帖子推送标题生成器</h1>
    <p class="subtitle">输入帖子链接，调用 workflow Agent 生成推送标题与摘要。</p>
    <label for="url">帖子链接</label>
    <input type="text" id="url" placeholder="粘贴帖子链接，如 https://longbridge.cn/zh-CN/topics/39057333" />
    <button class="btn" id="btn">生成推送标题</button>
    <p class="err" id="err"></p>
    <p class="loading" id="loading" style="display:none;">正在调用 Agent，请稍候（通常需要几秒到几十秒）...</p>
    <div class="result-card" id="result" style="display:none;">
      <h2>生成结果</h2>
      <div class="field">
        <div class="field-label">帖子 ID</div>
        <div class="field-value" id="resId">—</div>
      </div>
      <div class="field">
        <div class="field-label">推送标题（三语）</div>
        <div class="field-value title" id="resTitle">—</div>
      </div>
      <div class="field">
        <div class="field-label">摘要（三语）</div>
        <div class="field-value" id="resSummary">—</div>
      </div>
      <button class="raw-toggle" id="rawToggle">查看原始返回 ▾</button>
      <div class="raw-box" id="rawBox"></div>
    </div>
  </div>

  <script>
    const API_RUN = (window.location.origin || "") + "/api/run";

    function copyLine(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = "已复制";
        setTimeout(() => btn.textContent = orig, 1200);
      }).catch(() => {});
    }

    function renderLines(items, langs, containerId, bold) {
      const el = document.getElementById(containerId);
      if (!items.length) { el.textContent = "—"; return; }
      el.innerHTML = items.map((t, i) => {
        const lang = langs[i] || "";
        const style = bold ? ' style="font-weight:600"' : '';
        return `<div class="row-line"><span class="lang">${lang}</span><span class="txt"${style}>${t}</span><button class="copy-btn" onclick="copyLine('${t.replace(/'/g, "\\'")}', this)">复制</button></div>`;
      }).join("");
    }

    function extractTopicId(url) {
      const m = url.match(/topics\/(\d+)/);
      return m ? m[1] : "";
    }

    function parseOutput(data) {
      const d = data.data || data;
      const outputText = d.outputs?.text || d.outputs?.output?.text || "";
      const topicId = extractTopicId(document.getElementById("url").value);
      // 解析实际返回格式：帖子 id / 标题（三语）/ 摘要（三语）
      const lines = outputText.split(/\n/).map(l => l.trim()).filter(Boolean);
      let titles = [], summaries = [];
      let section = "";
      for (const line of lines) {
        if (/^帖子\s*[Ii][Dd]\s*[:：]/.test(line)) continue;
        if (/^标题\s*[:：]/.test(line)) { section = "title"; continue; }
        if (/^摘要\s*[:：]/.test(line)) { section = "summary"; continue; }
        const content = line.replace(/^[-\s]*/, "").replace(/^(简体中文|繁体中文|繁體中文|英文|English)\s*[:：]\s*/, "");
        if (section === "title" && content) titles.push(content);
        else if (section === "summary" && content) summaries.push(content);
      }
      return {
        id: topicId,
        titles,
        summaries,
        raw: outputText,
      };
    }

    async function run() {
      const urlInput = document.getElementById("url").value.trim();
      const btn = document.getElementById("btn");
      const errEl = document.getElementById("err");
      const loading = document.getElementById("loading");
      const result = document.getElementById("result");
      errEl.textContent = "";
      result.style.display = "none";
      if (!urlInput) { errEl.textContent = "请输入帖子链接"; return; }

      btn.disabled = true;
      loading.style.display = "block";
      try {
        const res = await fetch(API_RUN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic_link: urlInput }),
        });
        const data = await res.json();
        document.getElementById("rawBox").textContent = JSON.stringify(data, null, 2);
        if (data.data?.status === "failed") {
          errEl.textContent = data.data.error || "Agent 执行失败，请检查 workflow 配置";
          document.getElementById("rawToggle").style.display = "inline";
          document.getElementById("result").style.display = "block";
          document.getElementById("resId").textContent = "—";
          document.getElementById("resTitle").textContent = "—";
          document.getElementById("resSummary").textContent = "—";
          return;
        }
        if (data.code !== 0) {
          errEl.textContent = data.message || ("请求失败，code=" + data.code);
          return;
        }
        const parsed = parseOutput(data);
        document.getElementById("resId").textContent = parsed.id || "—";
        const langs = ["简中", "繁中", "英文"];
        if (parsed.titles.length) {
          renderLines(parsed.titles, langs, "resTitle", true);
        } else {
          document.getElementById("resTitle").textContent = parsed.raw || "—";
        }
        renderLines(parsed.summaries, langs, "resSummary", false);
        result.style.display = "block";
      } catch (e) {
        errEl.textContent = "请求异常：" + e.message;
      } finally {
        btn.disabled = false;
        loading.style.display = "none";
      }
    }

    document.getElementById("btn").addEventListener("click", run);
    document.getElementById("url").addEventListener("keydown", e => { if (e.key === "Enter") run(); });
    document.getElementById("rawToggle").addEventListener("click", () => {
      const box = document.getElementById("rawBox");
      box.style.display = box.style.display === "none" ? "block" : "none";
    });
  </script>
</body>
</html>
