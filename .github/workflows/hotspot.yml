name: 热点消息提示 定时任务

on:
  schedule:
    # 北京时间 (UTC+8)，周一到周五
    - cron: '30 1 * * 1-5'   # 09:30
    - cron: '0 3 * * 1-5'    # 11:00
    - cron: '30 5 * * 1-5'   # 13:30
    - cron: '0 7 * * 1-5'    # 15:00
    - cron: '0 9 * * 1-5'    # 17:00
    - cron: '0 11 * * 1-5'   # 19:00
    - cron: '0 13 * * 1-5'   # 21:00
    - cron: '30 14 * * 1-5'  # 22:30
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  hotspot:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests beautifulsoup4 openai python-dotenv

      - name: 运行热点消息提示工具
        run: |
          cd 热点消息提示工具
          python run_hotspot_workflow.py --llm --timeout 30
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: 提交结果到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 热点消息提示工具/step1_finance_frontpage/step1_output.md 热点消息提示工具/step1_finance_frontpage/step2_input.txt 热点消息提示工具/step3_input.txt 热点消息提示工具/step3_output.txt
          git diff --cached --quiet || git commit -m "hotspot: $(date '+%Y-%m-%d %H:%M') 自动更新"
          git push

      - name: 推送到 Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            CONTENT=$(cat 热点消息提示工具/step3_output.txt)
            ESCAPED=$(echo "$CONTENT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":${ESCAPED}}"
          else
            echo "未配置 SLACK_WEBHOOK_URL，跳过推送"
          fi
